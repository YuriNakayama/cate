name: build

on:
  workflow_dispatch:
  push:
  pull_request:
    paths:
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/lint.yaml"
      - ".github/workflows/lint.yaml"
      - ".github/workflows/test.yaml"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"
      
      - name: Install Dependencies
        run: |
          set -x
          date
          hostname
          python -m pip install --upgrade pip
          pip install --progress-bar off -U poetry
          poetry env use 3.11
          poetry install

      - name: Build
        run: poetry build

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: build-artifact
          path: ./dist
